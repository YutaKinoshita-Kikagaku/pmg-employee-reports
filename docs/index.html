<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正社員育成レポート — PMG</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-sub: #718096;
      --accent: #3182ce;
      --accent-light: #ebf8ff;
      --good: #38a169;
      --warn: #d69e2e;
      --bad: #e53e3e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-sub); margin-bottom: 2rem; }
    .report-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .report-link { display: block; padding: 1rem 1.25rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text); transition: border-color 0.15s, box-shadow 0.15s; }
    .report-link:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(49,130,206,0.1); }
    .report-link .date { font-weight: 600; color: var(--accent); }
    .report-link .label { color: var(--text-sub); font-size: 0.875rem; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>正社員育成レポート</h1>
    <p class="subtitle">PMG — 2026年4月入社（5名）</p>
    <div class="report-list">
      <a class="report-link" href="weekly/2026-04-01.html">
        <span class="date">2026-04-01</span>
        <span class="label">入社初日（テスト版）</span>
      </a>
    </div>
  </div>
</body>
</html>
